<!DOCTYPE html>
<html lang="ar" dir="rtl" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نواة الضبعة للطاقة النووية</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Load Questions -->
  <script src="questions.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
    body { font-family: 'Cairo', sans-serif; }
    /* Modern scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: inherit; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .dark ::-webkit-scrollbar-thumb { background: #475569; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .glassmorphism {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    }
    .dark .glassmorphism {
        background: rgba(15, 23, 42, 0.85);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { primary: '#eab308' } } }
    }
  </script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 antialiased selection:bg-amber-200 dark:selection:bg-amber-500/30 transition-colors duration-300">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    
    // Icon Helper
    const Icon = ({ name, className }) => {
        const iconRef = useRef(null);
        useEffect(() => {
            if (iconRef.current && window.lucide) {
                window.lucide.createIcons({
                    icons: { [name]: window.lucide.icons[name] },
                    nameAttr: 'data-lucide',
                    attrs: { class: className, stroke: "currentColor", 'stroke-width': "2", 'stroke-linecap': "round", 'stroke-linejoin': "round" }
                });
            }
        }, [name, className]);
        return <i ref={iconRef} data-lucide={name} className={className}></i>;
    };

    const SYSTEM_PROMPT = "أنت 'نواة'، مساعد ذكي لطلاب مدرسة الضبعة للطاقة النووية. اجعل إجاباتك قصيرة ومباشرة ومحفزة وباللهجة المصرية.";

    const App = () => {
      const [view, setView] = useState('home');
      const [activeCat, setActiveCat] = useState(null);
      const [chatInfo, setChatInfo] = useState([
        { role: 'assistant', text: 'أهلاً بك يا بطل! أنا "نواة"، جاهز نبدأ؟' }
      ]);
      const [msg, setMsg] = useState("");
      const [typing, setTyping] = useState(false);
      const [apiKey, setApiKey] = useState(localStorage.getItem('geminiApiKey') || '');
      const [isDark, setIsDark] = useState(() => localStorage.getItem('theme') === 'dark');

      // Quiz State
      const [qIndex, setQIndex] = useState(0);
      const [score, setScore] = useState(0);
      const [isFinished, setIsFinished] = useState(false);
      const [selectedOpt, setSelectedOpt] = useState(null);

      useEffect(() => {
        if (isDark) {
          document.documentElement.classList.add('dark');
          localStorage.setItem('theme', 'dark');
        } else {
          document.documentElement.classList.remove('dark');
          localStorage.setItem('theme', 'light');
        }
      }, [isDark]);

      const categories = [
        { id: 'iq', name: 'الذكاء (IQ)', icon: 'brain', color: 'bg-purple-500', desc: 'أنماط بصرية ومنطق' },
        { id: 'science', name: 'العلوم النووية', icon: 'atom', color: 'bg-blue-500', desc: 'فيزياء وكيمياء' },
        { id: 'math', name: 'الرياضيات', icon: 'calculator', color: 'bg-emerald-500', desc: 'جبر وهندسة' },
        { id: 'english', name: 'اللغة الإنجليزية', icon: 'languages', color: 'bg-orange-500', desc: 'قواعد واستيعاب' },
      ];

      const questionsList = activeCat && window.MOCK_QUESTIONS ? window.MOCK_QUESTIONS[activeCat.id] : [];

      const startQuiz = (cat) => {
        setActiveCat(cat);
        setQIndex(0);
        setScore(0);
        setIsFinished(false);
        setSelectedOpt(null);
        setView('training');
      };

      const handleAnswer = (idx) => {
        if (selectedOpt !== null) return;
        setSelectedOpt(idx);
        if (idx === questionsList[qIndex].correct) {
          setScore(s => s + 1);
        }
        setTimeout(() => {
          if (qIndex + 1 < questionsList.length) {
            setQIndex(q => q + 1);
            setSelectedOpt(null);
          } else {
            setIsFinished(true);
          }
        }, 1000);
      };

      const saveKey = (e) => {
        const val = e.target.value;
        setApiKey(val);
        localStorage.setItem('geminiApiKey', val);
      };

      const sendAI = async () => {
        if (!msg.trim() || !apiKey) return;
        const newMsg = { role: 'user', text: msg };
        setChatInfo(p => [...p, newMsg]);
        setMsg("");
        setTyping(true);

        try {
          const contents = chatInfo.map(m => ({ role: m.role === 'assistant' ? 'model' : 'user', parts: [{ text: m.text }] }));
          contents.push({ role: 'user', parts: [{ text: msg.trim() }] });
          
          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents, systemInstruction: { role: 'model', parts: [{ text: SYSTEM_PROMPT }] } })
          });
          const data = await res.json();
          let ans = "أنا مش قادر أرد دلوقتي، ممكن تتأكد من مفتاح الـ API؟";
          if (data.candidates && data.candidates[0].content) {
            ans = data.candidates[0].content.parts[0].text;
          }
          setChatInfo(p => [...p, { role: 'assistant', text: ans }]);
        } catch (e) {
          setChatInfo(p => [...p, { role: 'assistant', text: "حدث خطأ في الاتصال بالإنترنت أو بالمفتاح السري." }]);
        } finally {
          setTyping(false);
        }
      };

      return (
        <div className="min-h-screen pb-10">
          {/* Navbar */}
          <nav className="glassmorphism sticky top-0 z-50 px-6 py-4 mb-8">
            <div className="max-w-6xl mx-auto flex justify-between items-center">
              <div className="flex items-center gap-3 cursor-pointer group" onClick={() => setView('home')}>
                <div className="bg-gradient-to-br from-amber-400 to-orange-500 p-2 rounded-xl text-white shadow-lg shadow-orange-500/30 group-hover:scale-110 transition-transform">
                  <Icon name="zap" className="w-6 h-6" />
                </div>
                <h1 className="text-2xl font-black text-slate-800 dark:text-white tracking-tight">نواة <span className="text-amber-500">الضبعة</span></h1>
              </div>
              <div className="flex items-center gap-5">
                 <button 
                    onClick={() => setIsDark(!isDark)} 
                    aria-label="تبديل المظهر"
                    className={`relative w-[68px] h-9 flex-shrink-0 rounded-full transition-all duration-500 focus:outline-none overflow-hidden border cursor-pointer ${isDark ? 'bg-slate-800/80 border-slate-700 shadow-[inset_0_2px_4px_rgba(0,0,0,0.4)]' : 'bg-sky-100 border-sky-200 shadow-[inset_0_2px_4px_rgba(0,0,0,0.1)]'}`}
                 >
                    <div className="absolute inset-0 flex items-center justify-between px-[10px]">
                       <Icon name="sun" className={`w-4 h-4 text-amber-500 transition-all duration-500 transform ${isDark ? 'opacity-100 scale-100 rotate-0' : 'opacity-0 scale-50 rotate-90'}`} />
                       <Icon name="moon" className={`w-4 h-4 text-slate-400 transition-all duration-500 transform ${!isDark ? 'opacity-100 scale-100 rotate-0' : 'opacity-0 scale-50 -rotate-90'}`} />
                    </div>
                    <div className={`absolute top-1 w-7 h-7 rounded-full transition-all duration-500 flex items-center justify-center pointer-events-none shadow-sm ${isDark ? 'right-9 bg-slate-700 shadow-slate-950' : 'right-1 bg-white shadow-sky-900/20'}`}>
                       {isDark ? <Icon name="moon" className="w-4 h-4 text-blue-100" /> : <Icon name="sun" className="w-4 h-4 text-amber-500" />}
                    </div>
                 </button>
                 <div className="hidden md:flex flex-col text-left mr-2">
                    <span className="text-[10px] text-slate-400 dark:text-slate-500 uppercase font-bold tracking-widest">تأهيل</span>
                    <span className="text-sm font-bold text-slate-700 dark:text-slate-200 mt-[-2px]">القدرات والـ IQ</span>
                 </div>
                 <div className="w-10 h-10 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-full flex items-center justify-center shadow-sm cursor-pointer hover:shadow-md transition-shadow">
                    <Icon name="user" className="w-5 h-5 text-slate-500 dark:text-slate-400" />
                 </div>
              </div>
            </div>
          </nav>

          <main className="max-w-6xl mx-auto px-4 md:px-6 relative">
            
            {/* API Key Warning */}
            {(!apiKey && view === 'home') && (
              <div className="bg-orange-50 dark:bg-orange-900/20 border border-orange-200 dark:border-orange-500/30 p-5 rounded-2xl mb-8 shadow-sm flex flex-col md:flex-row gap-4 items-start md:items-center justify-between">
                  <div className="flex gap-3 items-center">
                     <div className="bg-orange-100 dark:bg-orange-800/50 p-2 rounded-full shrink-0">
                       <Icon name="key" className="text-orange-600 dark:text-orange-400 w-5 h-5" />
                     </div>
                     <div>
                        <h3 className="font-bold text-orange-800 dark:text-orange-300 text-sm md:text-base">تفعيل المدرب الذكي</h3>
                        <p className="text-xs md:text-sm text-orange-600 dark:text-orange-400/80 mt-1">أدخل مفتاح Gemini API لتفعيل محادثة الذكاء الاصطناعي.</p>
                     </div>
                  </div>
                  <input type="password" value={apiKey} onChange={saveKey} placeholder="أدخل مفتاح API هنا..." className="w-full md:w-72 p-3 font-mono text-sm border border-orange-300 dark:border-orange-500/50 rounded-xl bg-white dark:bg-slate-900 focus:ring-2 focus:ring-orange-400 outline-none transition-shadow placeholder:font-sans dark:text-white" />
              </div>
            )}

            {view === 'home' && (
              <div className="space-y-16 animate-fade-in">
                {/* Hero section */}
                <header className="text-center py-10">
                  <span className="bg-amber-100/80 dark:bg-amber-900/30 text-amber-700 dark:text-amber-400 px-5 py-2 rounded-full text-sm font-bold border border-amber-200 dark:border-amber-500/30 mb-6 inline-block shadow-sm">المنصة الأذكى للتأهيل المبكر</span>
                  <h2 className="text-4xl md:text-6xl font-black mb-6 text-slate-800 dark:text-white leading-[1.2]">
                    استعد لمستقبلك <br className="md:hidden"/> <span className="text-transparent bg-clip-text bg-gradient-to-l from-orange-500 to-amber-400">النووي بثقة</span>
                  </h2>
                  <p className="text-lg md:text-xl text-slate-500 dark:text-slate-400 max-w-2xl mx-auto font-medium">ابدأ رحلتك للقبول في مدرسة الضبعة عبر تدريبات ذكية ومحاكاة دقيقة تضمن لك التفوق.</p>
                </header>

                {/* Categories */}
                <section>
                  <div className="flex justify-between items-end mb-8">
                    <div>
                      <h3 className="text-2xl font-black text-slate-800 dark:text-white mb-2 mt-4 ml-6 flex items-center gap-2">
                        <Icon name="book-open" className="text-slate-400 dark:text-slate-500 w-6 h-6" /> مسارات التدريب
                      </h3>
                      <p className="text-slate-500 dark:text-slate-400 text-sm ml-6">اختر المادة وابدأ التدريب فوراً ({window.MOCK_QUESTIONS?.iq?.length || 0} سؤال لكل قسم)</p>
                    </div>
                  </div>
                  
                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                    {categories.map(cat => (
                      <div key={cat.id} onClick={() => startQuiz(cat)} className="bg-white dark:bg-slate-800/80 rounded-3xl p-6 shadow-xl shadow-slate-200/40 dark:shadow-none hover:shadow-2xl hover:-translate-y-2 transition-all duration-300 cursor-pointer border border-slate-100 dark:border-slate-700 group relative overflow-hidden backdrop-blur-sm">
                         <div className="absolute top-0 right-0 w-32 h-32 bg-gradient-to-bl from-slate-50 dark:from-slate-700/50 to-transparent -mr-10 -mt-10 rounded-full z-0 pointer-events-none transition-colors"></div>
                         <div className="relative z-10">
                           <div className={`${cat.color} w-16 h-16 rounded-2xl flex items-center justify-center text-white mb-6 group-hover:rotate-6 group-hover:scale-110 transition-transform duration-300 shadow-lg`}>
                              <Icon name={cat.icon} className="w-8 h-8" />
                           </div>
                           <h4 className="font-extrabold text-xl mb-2 text-slate-800 dark:text-white group-hover:text-amber-500 dark:group-hover:text-amber-400 transition-colors">{cat.name}</h4>
                           <p className="text-slate-500 dark:text-slate-400 text-sm font-medium">{cat.desc}</p>
                         </div>
                         <div className="absolute bottom-5 left-5 opacity-0 group-hover:opacity-100 transition-opacity transform translate-x-4 group-hover:translate-x-0">
                           <Icon name="arrow-left" className="text-amber-500 w-5 h-5" />
                         </div>
                      </div>
                    ))}
                  </div>
                </section>

                {/* AI CTA */}
                <section onClick={() => setView('ai')} className="bg-slate-900 rounded-[3rem] p-8 md:p-14 relative overflow-hidden cursor-pointer shadow-2xl group transition-all flex items-center mb-10 border border-slate-800">
                  <div className="absolute top-0 right-0 w-96 h-96 bg-amber-500/20 rounded-full blur-[100px] pointer-events-none transition-opacity group-hover:opacity-100 opacity-50"></div>
                  <div className="absolute bottom-0 left-0 w-96 h-96 bg-purple-500/20 rounded-full blur-[100px] pointer-events-none transition-opacity group-hover:opacity-100 opacity-50"></div>
                   
                   <div className="relative z-10 w-full md:w-2/3">
                      <div className="flex items-center gap-2 mb-4">
                        <span className="bg-amber-500/20 text-amber-400 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider backdrop-blur-sm border border-amber-500/20">ذكاء اصطناعي</span>
                        <span className="flex h-2 w-2">
                          <span className="animate-ping absolute inline-flex h-2 w-2 rounded-full bg-amber-400 opacity-75"></span>
                          <span className="relative inline-flex rounded-full h-2 w-2 bg-amber-500"></span>
                        </span>
                      </div>
                      <h3 className="text-3xl md:text-5xl font-black text-white mb-6 leading-tight">اسأل "نواة" <br/> المدرب الذكي</h3>
                      <p className="text-slate-400 text-lg mb-8 leading-relaxed max-w-xl font-medium">سؤال في الـ IQ واقف قدامك؟ مش فاهم قاعدة في العلوم؟ نواة هنا عشان يشرحلك كل حاجة خطوة بخطوة بطريقة ممتعة ومبسطة.</p>
                      <button className="bg-amber-400 hover:bg-amber-300 text-slate-900 px-8 py-4 rounded-2xl font-black flex items-center gap-3 transition-colors shadow-xl shadow-amber-400/20 transform group-hover:scale-105 duration-300">
                        ابدأ المحادثة الآن <Icon name="message-circle" className="w-5 h-5" />
                      </button>
                   </div>
                   
                   <div className="hidden md:flex absolute left-8 top-0 bottom-0 items-center justify-center pointer-events-none">
                      <div className="relative">
                         <div className="absolute inset-0 bg-amber-500 rounded-full blur-2xl opacity-40 group-hover:opacity-60 transition-opacity animate-pulse"></div>
                         <div className="w-48 h-48 bg-gradient-to-br from-amber-400 to-orange-500 rounded-[3rem] rotate-12 group-hover:rotate-6 transition-transform duration-500 flex items-center justify-center shadow-2xl relative z-10 border-4 border-slate-800">
                           <Icon name="bot" className="w-24 h-24 text-white drop-shadow-lg" />
                         </div>
                      </div>
                   </div>
                </section>
              </div>
            )}

            {view === 'training' && activeCat && (
              <div className="animate-fade-in max-w-3xl mx-auto pt-4 relative">
                <button onClick={() => setView('home')} className="mb-6 flex items-center gap-2 text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-white transition-colors bg-white dark:bg-slate-800 px-5 py-2.5 rounded-full shadow-sm border border-slate-200 dark:border-slate-700 hover:shadow-md font-bold text-sm w-fit group">
                  <Icon name="arrow-right" className="w-4 h-4 group-hover:-translate-x-1 transition-transform" /> العودة للرئيسية
                </button>
                
                <div className="bg-white dark:bg-slate-800/90 backdrop-blur-sm rounded-[2.5rem] p-8 md:p-12 shadow-2xl shadow-slate-200/50 dark:shadow-none border border-slate-100 dark:border-slate-700 relative overflow-hidden">
                  
                  {isFinished ? (
                    <div className="text-center py-10 animate-fade-in">
                       <div className="w-32 h-32 bg-amber-100 dark:bg-amber-900/30 rounded-full flex items-center justify-center mx-auto mb-6">
                          <Icon name="award" className="w-16 h-16 text-amber-500" />
                       </div>
                       <h2 className="text-4xl font-black text-slate-800 dark:text-white mb-4">اكتمل الاختبار!</h2>
                       <p className="text-lg text-slate-500 dark:text-slate-400 font-medium mb-8">لقد أجبت على {score} من أصل {questionsList.length} بشكل صحيح.</p>
                       <div className="flex justify-center gap-4">
                          <button onClick={() => setView('home')} className="bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-700 dark:text-white px-8 py-4 rounded-2xl font-black transition-colors">عودة للرئيسية</button>
                          <button onClick={() => startQuiz(activeCat)} className="bg-amber-400 hover:bg-amber-500 text-slate-900 px-8 py-4 rounded-2xl font-black shadow-lg shadow-amber-400/30 transition-colors">إعادة الاختبار</button>
                       </div>
                    </div>
                  ) : (
                    <>
                      <div className="absolute top-0 left-0 w-full h-1.5 bg-slate-100 dark:bg-slate-700">
                         <div className="h-full bg-amber-400 transition-all duration-300" style={{width: `${((qIndex)/questionsList.length)*100}%`}}></div>
                      </div>
                      
                      <div className="flex items-center justify-between gap-6 mb-8 mt-2 pb-6 border-b border-slate-100 dark:border-slate-700">
                         <div className="flex items-center gap-4">
                           <div className={`${activeCat.color} w-12 h-12 rounded-xl flex items-center justify-center text-white shadow-md`}>
                              <Icon name={activeCat.icon} className="w-6 h-6" />
                           </div>
                           <div>
                              <h2 className="text-xl font-bold text-slate-800 dark:text-white">تمرين {activeCat.name}</h2>
                              <span className="text-slate-500 dark:text-slate-400 text-xs font-semibold">سؤال {qIndex + 1} من {questionsList.length}</span>
                           </div>
                         </div>
                         <div className="bg-amber-50 dark:bg-amber-500/10 border border-amber-200 dark:border-amber-500/30 px-4 py-2 rounded-xl font-bold text-amber-600 dark:text-amber-400 flex gap-2 items-center">
                           <span>النتيجة: {score}</span>
                         </div>
                      </div>

                      <div className="animate-fade-in" key={qIndex}>
                        <h3 className="text-xl md:text-2xl font-semibold text-slate-800 dark:text-white leading-relaxed mb-8 bg-slate-50 dark:bg-slate-900/50 p-6 rounded-2xl border border-slate-100 dark:border-slate-700">
                          {questionsList[qIndex]?.q}
                        </h3>
                        
                        <div className="space-y-3">
                          {questionsList[qIndex]?.options.map((opt, i) => {
                            let stateClass = "border-slate-200 dark:border-slate-600 hover:border-amber-400 hover:bg-amber-50 dark:hover:bg-amber-500/10";
                            let icon = <span className="w-8 h-8 rounded-lg bg-slate-100 dark:bg-slate-700 flex items-center justify-center font-bold text-slate-500 dark:text-slate-400 ml-4">{i + 1}</span>;

                            if (selectedOpt !== null) {
                               if (i === questionsList[qIndex].correct) {
                                  stateClass = "border-green-500 bg-green-50 dark:bg-green-500/10 text-green-700 dark:text-green-400";
                                  icon = <Icon name="check-circle" className="w-8 h-8 ml-4 text-green-500" />;
                               } else if (i === selectedOpt) {
                                  stateClass = "border-red-500 bg-red-50 dark:bg-red-500/10 text-red-700 dark:text-red-400";
                                  icon = <Icon name="x-circle" className="w-8 h-8 ml-4 text-red-500" />;
                               } else {
                                  stateClass = "border-slate-200 dark:border-slate-700 opacity-50";
                               }
                            }
                            
                            return (
                              <button 
                                key={i} 
                                onClick={() => handleAnswer(i)}
                                disabled={selectedOpt !== null}
                                className={`w-full flex items-center p-4 rounded-2xl border-2 transition-all text-right font-medium text-lg disabled:cursor-not-allowed ${stateClass} dark:text-slate-200`}
                              >
                                {icon}
                                {opt}
                              </button>
                            );
                          })}
                        </div>
                      </div>
                    </>
                  )}
                </div>
              </div>
            )}

            {view === 'ai' && (
              <div className="h-[82vh] flex flex-col animate-fade-in relative max-w-4xl mx-auto pt-2">
                <button onClick={() => setView('home')} className="mb-4 flex items-center gap-2 text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-white transition-colors self-start bg-white dark:bg-slate-800 px-5 py-2.5 rounded-full shadow-sm border border-slate-200 dark:border-slate-700 hover:shadow-md z-10 w-fit font-bold text-sm">
                  <Icon name="arrow-right" className="w-4 h-4" /> خروج من المحادثة
                </button>
                
                <div className="flex-1 bg-white dark:bg-slate-900 rounded-[2.5rem] shadow-2xl shadow-slate-200/60 dark:shadow-none border border-slate-100 dark:border-slate-800 flex flex-col overflow-hidden relative">
                  
                  {/* Chat Header */}
                  <div className="px-6 py-5 bg-white/95 dark:bg-slate-900/95 backdrop-blur-sm border-b border-slate-100 dark:border-slate-800 flex items-center justify-between z-10">
                     <div className="flex items-center gap-4">
                       <div className="w-14 h-14 bg-gradient-to-tr from-amber-400 to-orange-500 rounded-2xl flex items-center justify-center text-white shadow-lg relative">
                         <Icon name="bot" className="w-7 h-7" />
                         <span className="absolute -bottom-1 -right-1 w-4 h-4 bg-green-500 border-[3px] border-white dark:border-slate-900 rounded-full"></span>
                       </div>
                       <div>
                         <h3 className="font-black text-slate-800 dark:text-white text-xl tracking-tight">الكابتن "نواة"</h3>
                         <p className="text-sm text-slate-500 dark:text-slate-400 flex items-center gap-1 font-medium mt-0.5">
                           مساعدك الذكي  <span className="w-1.5 h-1.5 bg-green-500 rounded-full inline-block mr-1"></span>متصل
                         </p>
                       </div>
                     </div>
                     <button className="w-10 h-10 bg-slate-50 dark:bg-slate-800 rounded-full flex justify-center items-center text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">
                       <Icon name="more-vertical" className="w-5 h-5" />
                     </button>
                  </div>

                  {/* Chat Box */}
                  <div className="flex-1 overflow-y-auto p-6 md:p-8 space-y-8 bg-slate-50/50 dark:bg-slate-900/50 scroll-smooth">
                    {chatInfo.map((m, i) => (
                      <div key={i} className={`flex ${m.role === 'user' ? 'justify-start' : 'justify-end'}`}>
                         <div className={`max-w-[85%] md:max-w-[75%] p-5 md:p-6 rounded-3xl relative ${
                           m.role === 'user'
                            ? 'bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 shadow-sm rounded-tr-sm text-slate-700 dark:text-slate-200'
                            : 'bg-gradient-to-br from-slate-900 to-slate-800 dark:from-slate-800 dark:to-slate-700 shadow-xl text-white rounded-tl-sm'
                         }`}>
                           {m.role === 'assistant' && (
                              <div className="absolute -top-3 -right-3 w-8 h-8 bg-amber-500 rounded-full flex items-center justify-center text-white shadow-md border-2 border-white dark:border-slate-900">
                                <Icon name="sparkles" className="w-4 h-4" />
                              </div>
                           )}
                           <p className="leading-loose whitespace-pre-wrap font-medium text-[15px]">{m.text}</p>
                         </div>
                      </div>
                    ))}
                    {typing && (
                      <div className="flex justify-end animate-fade-in">
                         <div className="bg-slate-800 dark:bg-slate-700 text-white px-6 py-5 rounded-3xl rounded-tl-sm flex gap-2 items-center shadow-lg">
                           <span className="w-2.5 h-2.5 rounded-full bg-amber-400 animate-bounce"></span>
                           <span className="w-2.5 h-2.5 rounded-full bg-amber-400 animate-bounce" style={{animationDelay: '150ms'}}></span>
                           <span className="w-2.5 h-2.5 rounded-full bg-amber-400 animate-bounce" style={{animationDelay: '300ms'}}></span>
                         </div>
                      </div>
                    )}
                  </div>

                  {/* AI Input */}
                  <div className="p-4 md:p-6 bg-white dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800 z-10">
                    <div className="flex gap-3 relative">
                      <input 
                        type="text" value={msg} onChange={e=>setMsg(e.target.value)} onKeyPress={e => e.key === 'Enter' && sendAI()}
                        placeholder="اسأل نواة أي حاجة في المنهج أو الـ IQ..."
                        className="flex-1 bg-slate-50 dark:bg-slate-800 text-slate-800 dark:text-white rounded-[1.25rem] px-6 py-4 outline-none border border-slate-200 dark:border-slate-700 focus:bg-white dark:focus:bg-slate-900 focus:ring-4 focus:ring-amber-400/20 focus:border-amber-400 transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500 font-medium text-[15px]"
                        disabled={!apiKey}
                      />
                      <button onClick={sendAI} disabled={typing || !apiKey} className="bg-amber-400 hover:bg-amber-500 text-slate-900 w-14 md:w-16 h-14 md:h-16 rounded-[1.25rem] flex items-center justify-center transition-all disabled:opacity-50 disabled:cursor-not-allowed shadow-lg shadow-amber-400/30 shrink-0">
                        <Icon name="send" className="w-6 h-6 -ml-1" />
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            )}

          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
